<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TimeBill Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style id="print-styles">
@media print {
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  body{background:#fff!important;color:#111!important;font-family:'DM Sans',Arial,sans-serif;margin:0;padding:0;}
  .app,body>*:not(#pdf-preview){display:none!important;}
  .toast,.modal-overlay{display:none!important;}
  #pdf-preview{display:block!important;position:static!important;}
}
#pdf-preview{
  display:none;position:fixed;inset:0;z-index:9999;
  background:#fff;overflow-y:auto;
  font-family:'DM Sans',Arial,sans-serif;color:#111;
}
.pdf-wrap{max-width:620px;margin:0 auto;padding:40px 32px 60px;}
.pdf-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #1e7aff;padding-bottom:20px;margin-bottom:28px;}
.pdf-logo{font-size:22px;font-weight:800;color:#1e7aff;letter-spacing:-0.5px;}
.pdf-logo span{color:#111;}
.pdf-doc-title{font-size:22px;font-weight:800;color:#111;margin-bottom:4px;letter-spacing:-0.4px;}
.pdf-doc-date{font-size:13px;color:#1e7aff;font-weight:600;}
.pdf-section-title{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#1e7aff;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #e8edf5;}
.pdf-table{width:100%;border-collapse:collapse;margin-bottom:28px;font-size:13px;}
.pdf-table th{text-align:left;padding:9px 12px;background:#f0f5ff;font-weight:700;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:#3366cc;}
.pdf-table th:last-child,.pdf-table td:last-child{text-align:right;}
.pdf-table td{padding:11px 12px;border-bottom:1px solid #eef2f8;color:#333;vertical-align:middle;}
.pdf-table tr:last-child td{border-bottom:none;}
.pdf-table tr:nth-child(even) td{background:#fafbff;}
.pdf-total-row{display:flex;justify-content:flex-end;margin-bottom:28px;}
.pdf-total-box{background:#f0f5ff;border:1px solid #c6d8ff;border-radius:12px;padding:16px 24px;min-width:240px;}
.pdf-total-box .row{display:flex;justify-content:space-between;gap:24px;font-size:13px;color:#555;margin-bottom:6px;}
.pdf-total-box .row.big{font-size:20px;font-weight:800;color:#1e7aff;margin-top:10px;padding-top:10px;border-top:1px solid #c6d8ff;margin-bottom:0;}
.pdf-remarks{background:#f8faff;border-left:3px solid #1e7aff;border-radius:6px;padding:14px 16px;margin-bottom:28px;font-size:13px;color:#333;line-height:1.8;}
.pdf-remarks div{margin-bottom:2px;}
.pdf-footer{text-align:center;font-size:11px;color:#aaa;border-top:1px solid #eef2f8;padding-top:16px;margin-top:12px;}
.pdf-close-btn{position:fixed;top:16px;right:16px;background:#1e7aff;color:white;border:none;border-radius:20px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(30,122,255,0.4);z-index:10000;font-family:inherit;}
.pdf-print-btn{position:fixed;top:16px;right:120px;background:#00c49a;color:white;border:none;border-radius:20px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(0,196,154,0.4);z-index:10000;font-family:inherit;}
@media print{.pdf-close-btn,.pdf-print-btn{display:none!important;}}
</style>

<style>
:root{
  --bg-deep:#050d1a;--bg-card:#0c1829;--bg-elevated:#112038;--bg-input:#0e1e30;
  --accent-blue:#1e7aff;--accent-blue-light:#4d9fff;--accent-teal:#00d4aa;
  --text-primary:#f0f4ff;--text-secondary:#8aa3c4;--text-muted:#4a6480;
  --border:rgba(30,122,255,0.15);--border-light:rgba(255,255,255,0.06);
  --danger:#ff4d6d;--shadow-glow:0 0 40px rgba(30,122,255,0.12);--radius-btn:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',-apple-system,'Hiragino Sans','Noto Sans KR',sans-serif;background:var(--bg-deep);color:var(--text-primary);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 10% -10%,rgba(30,122,255,0.12) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 90% 110%,rgba(0,212,170,0.07) 0%,transparent 60%);pointer-events:none;z-index:0;}
.app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;z-index:1;}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px 0;font-size:12px;font-weight:600;color:var(--text-secondary);}
.header{padding:8px 20px 16px;display:flex;align-items:center;justify-content:space-between;}
.app-title{font-size:26px;font-weight:700;background:linear-gradient(135deg,#f0f4ff 30%,#8ab4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px;}
.header-right{display:flex;align-items:center;gap:8px;}
.lang-switcher{position:relative;}
.lang-btn{background:rgba(30,122,255,0.12);border:1px solid rgba(30,122,255,0.25);color:var(--accent-blue-light);font-size:12px;font-weight:700;padding:5px 11px;border-radius:20px;cursor:pointer;font-family:inherit;transition:all 0.2s;white-space:nowrap;}
.lang-btn:active{transform:scale(0.95);}
.lang-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg-elevated);border:1px solid var(--border-light);border-radius:14px;overflow:hidden;display:none;z-index:200;box-shadow:0 16px 40px rgba(0,0,0,0.5);min-width:140px;}
.lang-dropdown.open{display:block;animation:fadeDown 0.18s ease;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.lang-option{display:flex;align-items:center;gap:8px;padding:11px 16px;font-size:13px;font-weight:500;color:var(--text-secondary);cursor:pointer;transition:background 0.15s;}
.lang-option:hover{background:rgba(30,122,255,0.1);color:var(--text-primary);}
.lang-option.active{color:var(--accent-blue-light);background:rgba(30,122,255,0.08);}
.header-badge{background:rgba(30,122,255,0.15);border:1px solid rgba(30,122,255,0.3);color:var(--accent-blue-light);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;display:none;align-items:center;gap:4px;}
.running-dot{display:inline-block;width:8px;height:8px;background:var(--accent-teal);border-radius:50%;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}
.nav-tabs{display:flex;gap:8px;padding:0 16px 20px;}
.nav-tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:600;border-radius:12px;border:none;cursor:pointer;transition:all 0.25s;font-family:inherit;}
.nav-tab.active{background:var(--accent-blue);color:white;box-shadow:0 4px 16px rgba(30,122,255,0.35);}
.nav-tab:not(.active){background:var(--bg-card);color:var(--text-secondary);border:1px solid var(--border-light);}
.section{display:none;padding:0 16px 100px;}
.section.active{display:block;}
.timer-display{background:linear-gradient(145deg,#0a1624,#0f1e32);border:1px solid var(--border);border-radius:24px;padding:32px 20px;text-align:center;margin-bottom:12px;box-shadow:var(--shadow-glow),inset 0 1px 0 rgba(255,255,255,0.04);position:relative;overflow:hidden;}
.timer-display::after{content:'';position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);width:200px;height:60px;background:radial-gradient(ellipse,rgba(30,122,255,0.15),transparent);pointer-events:none;}
.timer-project-name{font-size:13px;font-weight:600;color:var(--accent-blue-light);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;}
.timer-time{font-family:'JetBrains Mono',monospace;font-size:56px;font-weight:500;letter-spacing:-1px;color:var(--text-primary);line-height:1;margin-bottom:6px;}
.timer-earning{font-size:22px;font-weight:600;color:var(--accent-teal);}
.timer-earning span{font-size:14px;opacity:0.7;margin-right:2px;}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;border:none;border-radius:var(--radius-btn);font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,#1e7aff,#1565d8);color:white;box-shadow:0 4px 20px rgba(30,122,255,0.3);}
.btn-success{background:linear-gradient(135deg,#00c49a,#009e7c);color:white;box-shadow:0 4px 16px rgba(0,196,154,0.3);}
.btn-danger{background:linear-gradient(135deg,#ff4d6d,#d63651);color:white;box-shadow:0 4px 20px rgba(255,77,109,0.25);}
.btn-secondary{background:var(--bg-elevated);color:var(--text-secondary);border:1px solid var(--border-light);}
.btn-ghost{background:transparent;color:var(--accent-blue-light);border:1px solid rgba(30,122,255,0.25);}
.btn-gold{background:linear-gradient(135deg,#f0b429,#d4920e);color:#1a0e00;font-weight:700;box-shadow:0 4px 16px rgba(240,180,41,0.25);}
.btn-sm{padding:10px 16px;font-size:13px;border-radius:10px;width:auto;}
.project-selector{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:12px;}
.project-selector::-webkit-scrollbar{display:none;}
.project-chip{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border-light);background:var(--bg-card);color:var(--text-secondary);transition:all 0.2s;white-space:nowrap;}
.project-chip.selected{background:rgba(30,122,255,0.15);border-color:rgba(30,122,255,0.4);color:var(--accent-blue-light);}
.section-label{font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;padding-left:4px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;letter-spacing:0.04em;text-transform:uppercase;}
.form-input{width:100%;background:var(--bg-input);border:1px solid var(--border-light);border-radius:12px;padding:14px 16px;font-family:inherit;font-size:15px;color:var(--text-primary);outline:none;transition:border-color 0.2s,box-shadow 0.2s;-webkit-appearance:none;}
.form-input:focus{border-color:rgba(30,122,255,0.5);box-shadow:0 0 0 3px rgba(30,122,255,0.1);}
.form-input::placeholder{color:var(--text-muted);}
textarea.form-input{resize:none;line-height:1.6;}
.form-row{display:flex;gap:10px;}
.form-row .form-group{flex:1;}
.project-item{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:16px;margin-bottom:10px;}
.project-dot{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-right:12px;flex-shrink:0;}
.project-info{flex:1;}
.project-item-name{font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:2px;}
.project-item-rate{font-size:12px;color:var(--text-secondary);}
.project-item-actions{display:flex;gap:6px;}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border-light);background:var(--bg-elevated);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all 0.15s;}
.icon-btn:active{transform:scale(0.9);}
.icon-btn.danger:hover{background:rgba(255,77,109,0.15);border-color:rgba(255,77,109,0.3);color:var(--danger);}
.session-item{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:14px;margin-bottom:8px;}
.session-left{flex:1;}
.session-project{font-size:14px;font-weight:600;margin-bottom:3px;}
.session-date{font-size:11px;color:var(--text-muted);}
.session-right{text-align:right;}
.session-duration{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;color:var(--text-secondary);margin-bottom:3px;}
.session-amount{font-size:15px;font-weight:700;color:var(--accent-teal);}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:16px;padding:16px;text-align:center;}
.stat-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
.stat-value{font-size:22px;font-weight:700;letter-spacing:-0.5px;}
.stat-value.green{color:var(--accent-teal);}
.stat-value.blue{color:var(--accent-blue-light);}
.bill-output{background:var(--bg-input);border:1px solid var(--border);border-radius:14px;padding:16px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-secondary);line-height:1.7;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto;}
.remarks-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:16px;padding:16px 18px;margin-bottom:12px;position:relative;overflow:hidden;}
.remarks-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent-blue);border-radius:3px 0 0 3px;}
.remarks-card-title{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent-blue-light);margin-bottom:8px;}
.remarks-preview{font-size:13px;color:var(--text-secondary);line-height:1.7;white-space:pre-wrap;word-break:break-word;}
.backup-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.bill-top-actions{display:flex;gap:8px;margin-top:12px;margin-bottom:0;}
.bill-top-actions .btn-primary{flex:1;}
.colors{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.color-swatch{width:28px;height:28px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
.color-swatch.selected{border-color:white;transform:scale(1.15);}
.emoji-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.emoji-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border-light);background:var(--bg-elevated);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.emoji-btn.selected{border-color:rgba(30,122,255,0.5);background:rgba(30,122,255,0.1);}
.divider{height:1px;background:var(--border-light);margin:16px 0;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent-teal);color:#002a21;font-weight:700;font-size:14px;padding:12px 24px;border-radius:30px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:1000;box-shadow:0 8px 24px rgba(0,212,170,0.3);white-space:nowrap;max-width:92vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);}
.empty-state .icon{font-size:40px;margin-bottom:12px;opacity:0.5;}
.empty-state p{font-size:14px;}
.modal-overlay{position:fixed;inset:0;background:rgba(5,13,26,0.85);backdrop-filter:blur(8px);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg-card);border-radius:24px 24px 0 0;border:1px solid var(--border-light);border-bottom:none;padding:20px 20px 40px;width:100%;max-width:430px;animation:slideUp 0.3s cubic-bezier(0.32,0.72,0,1);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--text-muted);border-radius:2px;margin:0 auto 20px;opacity:0.5;}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px;}
.filter-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:12px;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;padding:6px 14px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border-light);background:var(--bg-card);color:var(--text-muted);transition:all 0.15s;}
.filter-chip.active{background:rgba(30,122,255,0.12);border-color:rgba(30,122,255,0.35);color:var(--accent-blue-light);}
.bottom-safe{height:80px;}
::-webkit-scrollbar{width:0;}
#import-file-input{display:none;}

/* ═══════════ PRO BADGE ═══════════ */
.pro-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:linear-gradient(135deg,#f0b429,#e09800);
  color:#1a0a00;font-size:10px;font-weight:800;
  padding:3px 8px;border-radius:10px;letter-spacing:0.06em;
  text-transform:uppercase;cursor:pointer;
  box-shadow:0 2px 8px rgba(240,180,41,0.35);
  transition:transform 0.15s,box-shadow 0.15s;
  vertical-align:middle;
}
.pro-badge:active{transform:scale(0.94);}
.free-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
  color:var(--text-muted);font-size:10px;font-weight:700;
  padding:3px 8px;border-radius:10px;letter-spacing:0.05em;
  text-transform:uppercase;cursor:pointer;transition:all 0.15s;
}
.free-badge:hover{border-color:rgba(30,122,255,0.4);color:var(--accent-blue-light);}

/* project limit indicator */
.proj-limit-bar{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;background:var(--bg-card);border:1px solid var(--border-light);
  border-radius:12px;margin-bottom:12px;font-size:12px;color:var(--text-secondary);
}
.proj-limit-dots{display:flex;gap:4px;}
.proj-dot{width:10px;height:10px;border-radius:50%;background:var(--border-light);transition:background 0.2s;}
.proj-dot.used{background:var(--accent-blue);}
.proj-dot.max{background:var(--danger);}

/* ═══════════ PAYWALL OVERLAY ═══════════ */
#paywall-overlay{
  position:fixed;inset:0;z-index:500;
  display:none;align-items:flex-end;justify-content:center;
  background:rgba(3,8,18,0.75);backdrop-filter:blur(16px);
}
#paywall-overlay.open{display:flex;}
.paywall-sheet{
  width:100%;max-width:430px;
  background:linear-gradient(170deg,#071228 0%,#0a1c3a 40%,#081628 100%);
  border:1px solid rgba(30,122,255,0.2);
  border-bottom:none;border-radius:28px 28px 0 0;
  padding:0 0 40px;
  position:relative;overflow:hidden;
  animation:slideUp 0.38s cubic-bezier(0.32,0.72,0,1);
}
/* glassmorphism shimmer */
.paywall-sheet::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 120% 60% at 50% -10%,rgba(30,122,255,0.18) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 110%,rgba(0,212,170,0.08) 0%,transparent 50%);
  pointer-events:none;
}
.paywall-handle{width:40px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:14px auto 0;}
.paywall-header{text-align:center;padding:22px 24px 0;}
.paywall-icon{font-size:48px;margin-bottom:8px;display:block;filter:drop-shadow(0 0 20px rgba(30,122,255,0.5));}
.paywall-title{
  font-size:24px;font-weight:800;letter-spacing:-0.5px;
  background:linear-gradient(135deg,#f0f4ff 20%,#7fb3ff 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:6px;
}
.paywall-sub{font-size:13px;color:var(--text-muted);line-height:1.5;padding:0 12px;}

/* comparison table */
.paywall-compare{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;margin:20px 16px 0;
}
.pw-col{
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
  border-radius:16px;padding:14px 12px;
}
.pw-col.pro{
  background:rgba(30,122,255,0.08);border-color:rgba(30,122,255,0.3);
  box-shadow:0 0 24px rgba(30,122,255,0.1);
}
.pw-col-title{
  font-size:11px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;
  margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.06);
}
.pw-col.free .pw-col-title{color:var(--text-muted);}
.pw-col.pro .pw-col-title{color:var(--accent-blue-light);}
.pw-row{
  display:flex;align-items:flex-start;gap:7px;
  font-size:12px;color:var(--text-secondary);line-height:1.4;
  margin-bottom:9px;
}
.pw-row:last-child{margin-bottom:0;}
.pw-row .ico{font-size:13px;flex-shrink:0;margin-top:1px;}
.pw-col.free .pw-row .ico{filter:grayscale(1);opacity:0.5;}
.pw-col.pro .pw-row{color:var(--text-primary);}

/* price + CTA */
.paywall-cta{padding:20px 16px 0;}
.paywall-price{
  text-align:center;margin-bottom:16px;
}
.paywall-price .amount{
  font-size:36px;font-weight:800;letter-spacing:-1px;
  background:linear-gradient(135deg,#f0f4ff,#7fb3ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.paywall-price .period{font-size:13px;color:var(--text-muted);margin-left:4px;}
.paywall-price .tag{
  display:inline-block;background:rgba(0,212,170,0.12);border:1px solid rgba(0,212,170,0.3);
  color:var(--accent-teal);font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:20px;margin-top:6px;letter-spacing:0.04em;
}

/* breathing glow button */
@keyframes breathe{
  0%,100%{box-shadow:0 4px 24px rgba(30,122,255,0.45),0 0 0 0 rgba(30,122,255,0.3);}
  50%{box-shadow:0 8px 40px rgba(30,122,255,0.65),0 0 0 8px rgba(30,122,255,0);}
}
.btn-paywall-upgrade{
  width:100%;padding:18px;border:none;border-radius:16px;
  background:linear-gradient(135deg,#2a8aff,#1060d0);
  color:white;font-family:inherit;font-size:17px;font-weight:800;
  letter-spacing:0.01em;cursor:pointer;
  animation:breathe 2.4s ease-in-out infinite;
  transition:transform 0.15s;position:relative;overflow:hidden;
}
.btn-paywall-upgrade::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.12),transparent 60%);
  pointer-events:none;
}
.btn-paywall-upgrade:active{transform:scale(0.97);animation:none;box-shadow:0 2px 12px rgba(30,122,255,0.4);}

.paywall-footer{
  display:flex;justify-content:center;gap:6px;
  margin-top:14px;flex-wrap:wrap;
}
.btn-paywall-restore{
  background:transparent;border:none;
  color:var(--text-muted);font-family:inherit;font-size:13px;font-weight:500;
  cursor:pointer;padding:8px 12px;border-radius:10px;transition:color 0.15s;
}
.btn-paywall-restore:hover{color:var(--accent-blue-light);}
.paywall-close-x{
  position:absolute;top:14px;right:16px;
  background:rgba(255,255,255,0.06);border:none;
  color:var(--text-muted);font-size:16px;font-weight:600;
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.paywall-close-x:hover{background:rgba(255,255,255,0.1);color:var(--text-primary);}
</style>
</head>

        </div>
      </div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('timer')" id="nav-timer"></button>
    <button class="nav-tab" onclick="switchTab('projects')" id="nav-projects"></button>
    <button class="nav-tab" onclick="switchTab('sessions')" id="nav-sessions"></button>
    <button class="nav-tab" onclick="switchTab('bill')" id="nav-bill"></button>
  </div>

  <!-- TIMER -->
  <div id="tab-timer" class="section active">
    <div class="timer-display">
      <div class="timer-project-name" id="timer-proj-name"></div>
      <div class="timer-time" id="timer-display">00:00:00</div>
      <div class="timer-earning" id="timer-earning"><span>¥</span>0.00</div>
    </div>
    <div class="section-label" id="lbl-select-project"></div>
    <div class="project-selector" id="project-chips"></div>
    <div style="display:flex;gap:10px;margin-bottom:12px;">
      <button class="btn btn-primary" id="btn-start" onclick="startTimer()"></button>
      <button class="btn btn-secondary btn-sm" id="btn-pause" onclick="pauseTimer()" style="display:none;width:auto;padding:14px 20px;"></button>
    </div>
    <button class="btn btn-secondary" id="btn-stop" onclick="stopTimer()" style="display:none;"></button>
    <div class="divider"></div>
    <div class="section-label" id="lbl-today"></div>
    <div id="today-sessions"></div>
  </div>

  <!-- PROJECTS -->
  <div id="tab-projects" class="section">
    <div class="section-label" id="lbl-my-projects"></div>
    <div class="proj-limit-bar" id="proj-limit-bar" style="display:none;">
      <div class="proj-limit-dots" id="proj-limit-dots"></div>
      <span id="proj-limit-text" style="flex:1;"></span>
      <span onclick="openPaywall()" style="font-size:11px;font-weight:700;color:var(--accent-blue-light);cursor:pointer;">→ Pro</span>
    </div>
    <div id="project-list"></div>
    <button class="btn btn-ghost" id="btn-new-project" onclick="openProjectModal()"></button>
  </div>

  <!-- SESSIONS -->
  <div id="tab-sessions" class="section">
    <div class="section-label" id="lbl-work-records"></div>
    <div class="filter-row" id="session-filters"></div>
    <div id="session-list"></div>
  </div>

  <!-- BILL -->
  <div id="tab-bill" class="section">
    <div class="section-label" id="lbl-bill-summary"></div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label" id="lbl-total-hours"></div>
        <div class="stat-value blue" id="bill-hours">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label" id="lbl-receivable"></div>
        <div class="stat-value green" id="bill-total">—</div>
      </div>
    </div>
    <div class="stats-grid" id="bill-breakdown"></div>

    <!-- Remarks -->
    <div class="section-label" id="lbl-remarks-section"></div>
    <div class="remarks-card" id="remarks-card" style="display:none;">
      <div class="remarks-card-title" id="lbl-remarks-card-title"></div>
      <div class="remarks-preview" id="remarks-preview-text"></div>
    </div>
    <button class="btn btn-ghost btn-sm" id="btn-edit-remarks" onclick="openRemarksModal()" style="width:100%;margin-bottom:16px;"></button>

    <!-- Bill text -->
    <div class="section-label" id="lbl-bill-text"></div>
    <div class="bill-output" id="bill-text"></div>

    <!-- Copy + PDF -->
    <div class="bill-top-actions">
      <button class="btn btn-primary" id="btn-copy-bill" onclick="copyBill()"></button>
      <button class="btn btn-gold btn-sm" id="btn-export-pdf" onclick="showPdfPreview()" style="flex:0 0 auto;padding:14px 18px;"></button>
    </div>

    <!-- Data management -->
    <div class="divider"></div>
    <div class="section-label" id="lbl-data-section"></div>
    <div class="backup-row">
      <button class="btn btn-secondary" id="btn-export-json" onclick="exportJSON()"></button>
      <button class="btn btn-secondary" id="btn-import-json" onclick="document.getElementById('import-file-input').click()"></button>
    </div>
    <button class="btn btn-danger" id="btn-clear" onclick="clearAll()"></button>
  </div>

  <div class="bottom-safe"></div>
</div>

<input type="file" id="import-file-input" accept=".json" onchange="importJSON(event)">
<div class="toast" id="toast"></div>

<!-- Project Modal -->
<div class="modal-overlay" id="project-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="form-group">
      <label class="form-label" id="lbl-project-name"></label>
      <input type="text" class="form-input" id="input-project-name">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" id="lbl-hourly-rate"></label>

      </div>
      <div class="form-group">
        <label class="form-label" id="lbl-currency"></label>
        <select class="form-input" id="input-currency">
          <option value="¥">¥ CNY</option>
          <option value="$">$ USD</option>
          <option value="€">€ EUR</option>
          <option value="¥JP">¥ JPY</option>
          <option value="₩">₩ KRW</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-icon"></label>
      <div class="emoji-row" id="emoji-picker"></div>
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-color"></label>
      <div class="colors" id="color-picker"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-primary" id="btn-save-project" onclick="saveProject()"></button>
      <button class="btn btn-secondary btn-sm" id="btn-cancel" onclick="closeModal()" style="width:auto;padding:14px 20px;"></button>
    </div>
  </div>
</div>

<!-- Remarks Modal -->
<div class="modal-overlay" id="remarks-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="remarks-modal-title"></div>
    <div class="form-group">
      <label class="form-label" id="lbl-payee"></label>
      <input type="text" class="form-input" id="input-payee">
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-bank"></label>
      <input type="text" class="form-input" id="input-bank">
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-account"></label>

    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-extra-notes"></label>
      <textarea class="form-input" id="input-extra-notes" rows="3"></textarea>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-primary" id="btn-save-remarks" onclick="saveRemarks()"></button>
      <button class="btn btn-secondary btn-sm" id="btn-cancel-remarks" onclick="closeRemarksModal()" style="width:auto;padding:14px 20px;"></button>

  </div>
</div>

<!-- PDF Preview -->
<div id="pdf-preview">

    </div>
  </div>
</div>

// ─── STATE ─────────────────────────────────────────────────────────────────────
const EMOJIS=['💼','🎨','✍️','💻','🔧','📊','📞','🚀','📐','🎯','📝','🔬'];
const COLORS=['#1e7aff','#00d4aa','#f0b429','#ff4d6d','#a78bfa','#fb923c','#34d399','#f472b6','#60a5fa','#facc15'];
let state={projects:[],sessions:[],isPro:false,timer:{running:false,paused:false,projectId:null,startTime:null,pausedTime:0,interval:null}};
let remarks={payee:'',bank:'',account:'',notes:''};
let selectedProjectId=null,selectedEmoji=EMOJIS[0],selectedColor=COLORS[0],editingProjectId=null,sessionFilter='all';

function save(){
  localStorage.setItem('timebill_projects',JSON.stringify(state.projects));
  localStorage.setItem('timebill_sessions',JSON.stringify(state.sessions));
  localStorage.setItem('timebill_remarks',JSON.stringify(remarks));
  localStorage.setItem('timebill_isPro',JSON.stringify(state.isPro));
}
function load(){
  try{state.projects=JSON.parse(localStorage.getItem('timebill_projects')||'[]');state.sessions=JSON.parse(localStorage.getItem('timebill_sessions')||'[]');}catch(e){state.projects=[];state.sessions=[];}
  try{const r=JSON.parse(localStorage.getItem('timebill_remarks')||'{}');remarks={payee:'',bank:'',account:'',notes:'',...r};}catch(e){remarks={payee:'',bank:'',account:'',notes:''};} 
  try{state.isPro=JSON.parse(localStorage.getItem('timebill_isPro')||'false');}catch(e){state.isPro=false;}
}

// ─── UTILS ─────────────────────────────────────────────────────────────────────
function fmtDur(ms){const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;}
function fmtShort(ms){const tot=Math.floor(ms/60000),h=Math.floor(tot/60),m=tot%60;return L().dur_h(h,m);}
function calcAmt(ms,rate){return((ms/3600000)*rate).toFixed(2);}
function fmtDate(ts){const d=new Date(ts);const Y=d.getFullYear(),M=String(d.getMonth()+1).padStart(2,'0'),D=String(d.getDate()).padStart(2,'0'),hh=String(d.getHours()).padStart(2,'0'),mm=String(d.getMinutes()).padStart(2,'0');return currentLang==='en'?`${M}/${D}/${Y} ${hh}:${mm}`:`${Y}/${M}/${D} ${hh}:${mm}`;}
function isToday(ts){return new Date(ts).toDateString()===new Date().toDateString();}
function csym(c){return c==='¥JP'?'¥':c;}

// ─── TIMER ─────────────────────────────────────────────────────────────────────
function getElapsed(){if(!state.timer.running&&!state.timer.paused)return 0;if(state.timer.paused)return state.timer.pausedTime;return Date.now()-state.timer.startTime+state.timer.pausedTime;}
function startTimer(){
  if(!selectedProjectId){showToast(t('toast_select'));return;}
  const p=state.projects.find(x=>x.id===selectedProjectId);if(!p)return;
  state.timer={...state.timer,running:true,paused:false,projectId:selectedProjectId,startTime:Date.now()};
  document.getElementById('btn-start').style.display='none';
  document.getElementById('btn-pause').style.display='flex';
  document.getElementById('btn-stop').style.display='flex';
  document.getElementById('running-badge').style.display='flex';
  document.getElementById('btn-pause').textContent=t('btn_pause');
  state.timer.interval=setInterval(tickTimer,500);tickTimer();
}
function pauseTimer(){
  if(state.timer.paused){state.timer={...state.timer,paused:false,running:true,startTime:Date.now()};document.getElementById('btn-pause').textContent=t('btn_pause');state.timer.interval=setInterval(tickTimer,500);}
  else{state.timer.pausedTime=getElapsed();state.timer.paused=true;state.timer.running=false;clearInterval(state.timer.interval);document.getElementById('btn-pause').textContent=t('btn_resume');}
}
function stopTimer(){
  const elapsed=getElapsed();if(elapsed<10000){showToast(t('toast_short'));return;}
  clearInterval(state.timer.interval);
  const p=state.projects.find(x=>x.id===state.timer.projectId);
  state.sessions.unshift({id:Date.now().toString(),projectId:state.timer.projectId,projectName:p?p.name:'',projectColor:p?p.color:'#1e7aff',projectEmoji:p?p.emoji:'💼',duration:elapsed,rate:p?p.rate:0,currency:p?p.currency:'¥',amount:parseFloat(calcAmt(elapsed,p?p.rate:0)),startTs:state.timer.startTime,endTs:Date.now()});
  save();state.timer={running:false,paused:false,projectId:null,startTime:null,pausedTime:0,interval:null};
  document.getElementById('btn-start').style.display='flex';document.getElementById('btn-pause').style.display='none';document.getElementById('btn-stop').style.display='none';document.getElementById('running-badge').style.display='none';
  document.getElementById('timer-display').textContent='00:00:00';document.getElementById('timer-earning').innerHTML='<span>¥</span>0.00';document.getElementById('timer-proj-name').textContent=t('no_project');
  renderAll();showToast(L().toast_recorded(fmtShort(elapsed)));
}
function tickTimer(){
  const elapsed=getElapsed(),p=state.projects.find(x=>x.id===state.timer.projectId);
  document.getElementById('timer-display').textContent=fmtDur(elapsed);
  if(p){document.getElementById('timer-earning').innerHTML=`<span>${csym(p.currency)}</span>${parseFloat(calcAmt(elapsed,p.rate)).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`;document.getElementById('timer-proj-name').textContent=`${p.emoji} ${p.name}`;}
}

// ─── PROJECTS ──────────────────────────────────────────────────────────────────
function openProjectModal(id=null){
  editingProjectId=id;document.getElementById('project-modal').classList.add('open');
  if(id){const p=state.projects.find(x=>x.id===id);document.getElementById('modal-title').textContent=t('modal_edit');document.getElementById('input-project-name').value=p.name;document.getElementById('input-hourly-rate').value=p.rate;document.getElementById('input-currency').value=p.currency;selectedEmoji=p.emoji;selectedColor=p.color;}
  else{document.getElementById('modal-title').textContent=t('modal_new');document.getElementById('input-project-name').value='';document.getElementById('input-hourly-rate').value='';selectedEmoji=EMOJIS[0];selectedColor=COLORS[0];}
  document.getElementById('input-project-name').placeholder=t('project_name_ph');renderPickers();
}
function closeModal(){document.getElementById('project-modal').classList.remove('open');}
const FREE_PROJECT_LIMIT=2;
function saveProject(){
  const name=document.getElementById('input-project-name').value.trim(),rate=parseFloat(document.getElementById('input-hourly-rate').value)||0,currency=document.getElementById('input-currency').value;
  if(!name){showToast(t('project_name_ph'));return;}
  // ── FREEMIUM GATE ──
  if(!editingProjectId && !state.isPro && state.projects.length>=FREE_PROJECT_LIMIT){
    closeModal();
    openPaywall();
    return;
  }
  if(editingProjectId){Object.assign(state.projects.find(x=>x.id===editingProjectId),{name,rate,currency,emoji:selectedEmoji,color:selectedColor});showToast(t('toast_updated'));}
  else{state.projects.push({id:Date.now().toString(),name,rate,currency,emoji:selectedEmoji,color:selectedColor});showToast(t('toast_created'));}
  save();closeModal();renderAll();
}
function deleteProject(id){
  if(!confirm(t('confirm_delete')))return;
  state.projects=state.projects.filter(p=>p.id!==id);if(selectedProjectId===id)selectedProjectId=null;save();renderAll();showToast(t('toast_deleted'));
}

  document.getElementById('pw-p3').textContent=c.p3;
  document.getElementById('pw-p4').textContent=c.p4;
  document.getElementById('pw-price').textContent=c.price;
  document.getElementById('pw-period').textContent=c.period;
  document.getElementById('pw-tag').textContent=c.tag;
  document.getElementById('pw-upgrade-btn').textContent=c.upgrade;
  document.getElementById('pw-restore-btn').textContent=c.restore;
  document.getElementById('pw-later-btn').textContent=c.later;
  document.getElementById('paywall-overlay').classList.add('open');
}
function closePaywall(){document.getElementById('paywall-overlay').classList.remove('open');}
document.getElementById('paywall-overlay').addEventListener('click',function(e){if(e.target===this)closePaywall();});
// Simulated IAP — swap for real StoreKit/RevenueCat bridge in production
function handlePurchase(){
  state.isPro=true;save();closePaywall();
  updateTierUI();renderAll();
  const c=PW_COPY[currentLang]||PW_COPY.zh;
  showToast(c.thanks);
}
function handleRestore(){
  // In production: query receipt / RevenueCat for entitlement
  const c=PW_COPY[currentLang]||PW_COPY.zh;
  if(state.isPro){showToast(c.restored);closePaywall();return;}
  // Simulate restore finding no prior purchase
  showToast(c.restored);
  // For demo purposes, also grant Pro on restore
  state.isPro=true;save();closePaywall();updateTierUI();renderAll();
}
function updateTierUI(){
  const badge=document.getElementById('tier-badge');
  if(state.isPro){
    badge.className='pro-badge';
    badge.textContent='PRO ✦';
    badge.onclick=null;
    badge.style.cursor='default';
  } else {
    badge.className='free-badge';
    badge.textContent='FREE';
    badge.onclick=openPaywall;
    badge.style.cursor='pointer';
  }
  // Show/hide project limit bar
  const bar=document.getElementById('proj-limit-bar');
  if(!state.isPro){
    bar.style.display='flex';
    const dots=document.getElementById('proj-limit-dots');
    const used=Math.min(state.projects.length,FREE_PROJECT_LIMIT);
    dots.innerHTML=Array.from({length:FREE_PROJECT_LIMIT},(_,i)=>{
      const cls=i<used?(used>=FREE_PROJECT_LIMIT?'proj-dot used max':'proj-dot used'):'proj-dot';
      return`<div class="${cls}"></div>`;
    }).join('');
    const l=PW_COPY[currentLang]||PW_COPY.zh;
    document.getElementById('proj-limit-text').textContent=`${used}/${FREE_PROJECT_LIMIT} ${l.f1.split(' ').slice(-1)[0]}`;
  } else {
    bar.style.display='none';
  }
}

// ─── REMARKS ───────────────────────────────────────────────────────────────────
function openRemarksModal(){
  document.getElementById('input-payee').value=remarks.payee||'';
  document.getElementById('input-bank').value=remarks.bank||'';
  document.getElementById('input-account').value=remarks.account||'';
  document.getElementById('input-extra-notes').value=remarks.notes||'';
  document.getElementById('remarks-modal').classList.add('open');
}
function closeRemarksModal(){document.getElementById('remarks-modal').classList.remove('open');}
function saveRemarks(){
  remarks.payee=document.getElementById('input-payee').value.trim();
  remarks.bank=document.getElementById('input-bank').value.trim();
  remarks.account=document.getElementById('input-account').value.trim();
  remarks.notes=document.getElementById('input-extra-notes').value.trim();
  save();closeRemarksModal();renderBill();showToast(t('toast_remarks_saved'));
}

// ─── RENDERS ───────────────────────────────────────────────────────────────────
function renderAll(){renderProjectChips();renderProjectList();renderSessions();renderBill();renderTodaySessions();updateTierUI();}
function renderProjectChips(){
  const el=document.getElementById('project-chips');
  if(!state.projects.length){el.innerHTML=`<div class="project-chip" style="color:var(--text-muted);cursor:default;border-style:dashed;">${t('no_projects_chip')}</div>`;return;}
  el.innerHTML=state.projects.map(p=>`<div class="project-chip ${selectedProjectId===p.id?'selected':''}" onclick="selectProject('${p.id}')" style="${selectedProjectId===p.id?`border-color:${p.color}55;color:${p.color};background:${p.color}18`:''}"> ${p.emoji} ${p.name}</div>`).join('');
}
function selectProject(id){
  if(state.timer.running||state.timer.paused)return;
  selectedProjectId=id;const p=state.projects.find(x=>x.id===id);
  if(p){document.getElementById('timer-proj-name').textContent=`${p.emoji} ${p.name}`;document.getElementById('timer-earning').innerHTML=`<span>${csym(p.currency)}</span>0.00`;}
  renderProjectChips();
}
function renderProjectList(){
  const el=document.getElementById('project-list');
  if(!state.projects.length){el.innerHTML=`<div class="empty-state"><div class="icon">📁</div><p>${t('no_projects_list').replace('\n','<br>')}</p></div>`;return;}
  el.innerHTML=state.projects.map(p=>{const total=state.sessions.filter(s=>s.projectId===p.id).reduce((a,s)=>a+s.amount,0);const c=csym(p.currency);return`<div class="project-item" style="border-left:3px solid ${p.color};"><div class="project-dot" style="background:${p.color}22;color:${p.color}">${p.emoji}</div><div class="project-info"><div class="project-item-name">${p.name}</div><div class="project-item-rate">${c}${p.rate}/h · ${t('accum')} ${c}${total.toFixed(2)}</div></div><div class="project-item-actions"><div class="icon-btn" onclick="openProjectModal('${p.id}')">✎</div><div class="icon-btn danger" onclick="deleteProject('${p.id}')">✕</div></div></div>`;}).join('');
}
function renderSessions(){
  const fEl=document.getElementById('session-filters'),lEl=document.getElementById('session-list');
  const filters=[{id:'all',label:t('filter_all')},...state.projects.map(p=>({id:p.id,label:`${p.emoji} ${p.name}`}))];
  fEl.innerHTML=filters.map(f=>`<div class="filter-chip ${sessionFilter===f.id?'active':''}" onclick="setFilter('${f.id}')">${f.label}</div>`).join('');
  const sessions=sessionFilter==='all'?state.sessions:state.sessions.filter(s=>s.projectId===sessionFilter);
  if(!sessions.length){lEl.innerHTML=`<div class="empty-state"><div class="icon">📋</div><p>${t('no_sessions')}</p></div>`;return;}
  lEl.innerHTML=sessions.map(s=>`<div class="session-item"><div class="session-left"><div class="session-project" style="color:${s.projectColor}">${s.projectEmoji} ${s.projectName}</div><div class="session-date">${fmtDate(s.startTs)} — ${fmtDate(s.endTs)}</div></div><div class="session-right"><div class="session-duration">${fmtShort(s.duration)}</div><div class="session-amount">${csym(s.currency)}${s.amount.toFixed(2)}</div></div></div>`).join('');
}
function setFilter(id){sessionFilter=id;renderSessions();}
function renderTodaySessions(){
  const el=document.getElementById('today-sessions');
  const today=state.sessions.filter(s=>isToday(s.startTs));
  if(!today.length){el.innerHTML=`<div style="color:var(--text-muted);font-size:13px;padding:8px 0;">${t('no_today')}</div>`;return;}
  el.innerHTML=today.slice(0,3).map(s=>`<div class="session-item"><div class="session-left"><div class="session-project" style="color:${s.projectColor}">${s.projectEmoji} ${s.projectName}</div><div class="session-date">${fmtDate(s.startTs)}</div></div><div class="session-right"><div class="session-duration">${fmtShort(s.duration)}</div><div class="session-amount">${csym(s.currency)}${s.amount.toFixed(2)}</div></div></div>`).join('');
}
function buildByProject(){
  const byP={};
  state.sessions.forEach(s=>{if(!byP[s.projectId])byP[s.projectId]={name:s.projectName,emoji:s.projectEmoji,color:s.projectColor,currency:s.currency,ms:0,amt:0};byP[s.projectId].ms+=s.duration;byP[s.projectId].amt+=s.amount;});
  return byP;
}
function renderBill(){
  const l=L();
  const totalMs=state.sessions.reduce((a,s)=>a+s.duration,0),totalAmt=state.sessions.reduce((a,s)=>a+s.amount,0);
  document.getElementById('bill-hours').textContent=fmtShort(totalMs);
  document.getElementById('bill-total').textContent=`¥${totalAmt.toFixed(2)}`;
  const byP=buildByProject();
  document.getElementById('bill-breakdown').innerHTML=Object.values(byP).map(p=>`<div class="stat-card" style="border-left:3px solid ${p.color};"><div class="stat-label">${p.emoji} ${p.name}</div><div class="stat-value" style="font-size:16px;color:${p.color}">${csym(p.currency)}${p.amt.toFixed(2)}</div><div style="font-size:11px;color:var(--text-muted);margin-top:4px">${fmtShort(p.ms)}</div></div>`).join('');

  // Remarks preview card
  const hasR=remarks.payee||remarks.bank||remarks.account||remarks.notes;
  const rc=document.getElementById('remarks-card');
  if(hasR){
    rc.style.display='block';
    let txt='';
    if(remarks.payee)txt+=`${l.bill_payee_label}：${remarks.payee}\n`;
    if(remarks.bank)txt+=`${l.bill_bank_label}：${remarks.bank}\n`;
    if(remarks.account)txt+=`${l.bill_account_label}：${remarks.account}\n`;
    if(remarks.notes)txt+=remarks.notes;
    document.getElementById('remarks-preview-text').textContent=txt.trim();
  }else{rc.style.display='none';}

  // Bill text
  if(!state.sessions.length){document.getElementById('bill-text').textContent=t('no_bill');return;}
  const now=new Date();
  const dateStr=l.bill_date_fmt(now.getFullYear(),now.getMonth()+1,now.getDate());
  let txt=`═══════════════════════\n       TimeBill Pro\n   ${l.bill_subtitle}\n═══════════════════════\n${l.bill_date_label}：${dateStr}\n\n`;
  Object.values(byP).forEach(p=>{txt+=`▸ ${p.emoji} ${p.name}\n  ${l.bill_hours_label}：${fmtShort(p.ms)}\n  ${l.bill_amount_label}：${csym(p.currency)}${p.amt.toFixed(2)}\n\n`;});
  txt+=`───────────────────────\n${l.bill_total_hours}：${fmtShort(totalMs)}\n${l.bill_total_amount}：¥${totalAmt.toFixed(2)}\n`;
  if(hasR){
    txt+=`\n${l.bill_remarks_header}\n`;
    if(remarks.payee)txt+=`${l.bill_payee_label}：${remarks.payee}\n`;
    if(remarks.bank)txt+=`${l.bill_bank_label}：${remarks.bank}\n`;
    if(remarks.account)txt+=`${l.bill_account_label}：${remarks.account}\n`;
    if(remarks.notes)txt+=`${l.bill_notes_label}：${remarks.notes}\n`;
  }
  txt+=`═══════════════════════\n${l.bill_footer}`;
  if(!state.isPro)txt+='\nPowered by TimeBill Pro (Free) — timebillpro.app';
  document.getElementById('bill-text').textContent=txt;
}
function renderPickers(){
  document.getElementById('emoji-picker').innerHTML=EMOJIS.map(e=>`<div class="emoji-btn ${selectedEmoji===e?'selected':''}" onclick="pickEmoji('${e}')">${e}</div>`).join('');
  document.getElementById('color-picker').innerHTML=COLORS.map(c=>`<div class="color-swatch ${selectedColor===c?'selected':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('');
}
function pickEmoji(e){selectedEmoji=e;renderPickers();}
function pickColor(c){selectedColor=c;renderPickers();}

// ─── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  if(tab==='bill')renderBill();
}

// ─── BILL ──────────────────────────────────────────────────────────────────────
function copyBill(){
  const txt=document.getElementById('bill-text').textContent;
  if(txt===t('no_bill')){showToast(t('toast_no_copy'));return;}
  navigator.clipboard.writeText(txt).then(()=>showToast(t('toast_copied'))).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast(t('toast_copied'));});
}
function clearAll(){if(!confirm(t('confirm_clear')))return;state.sessions=[];save();renderAll();showToast(t('toast_cleared'));}

// ─── PDF PREVIEW ───────────────────────────────────────────────────────────────
function showPdfPreview(){
  const l=L();
  if(!state.sessions.length){showToast(t('toast_no_copy'));return;}
  const now=new Date();
  const dateStr=l.bill_date_fmt(now.getFullYear(),now.getMonth()+1,now.getDate());
  const byP=buildByProject();
  const totalMs=state.sessions.reduce((a,s)=>a+s.duration,0);
  const totalAmt=state.sessions.reduce((a,s)=>a+s.amount,0);

  const rows=Object.values(byP).map(p=>{
    const c=csym(p.currency);
    const projRate=state.projects.find(x=>x.name===p.name)?.rate||'—';
    return`<tr>
      <td style="font-size:18px;width:36px;text-align:center;">${p.emoji}</td>
      <td style="font-weight:600;color:#111;">${p.name}</td>
      <td style="font-family:'JetBrains Mono',monospace;color:#555;">${fmtShort(p.ms)}</td>
      <td style="color:#555;">${c}${projRate}/h</td>
      <td style="font-weight:700;color:#1e7aff;">${c}${p.amt.toFixed(2)}</td>
    </tr>`;
  }).join('');

  const hasR=remarks.payee||remarks.bank||remarks.account||remarks.notes;
  let remarksHtml='';
  if(hasR){
    let lines='';
    if(remarks.payee)lines+=`<div><strong>${l.pdf_payee}：</strong>${remarks.payee}</div>`;
    if(remarks.bank)lines+=`<div><strong>${l.pdf_bank}：</strong>${remarks.bank}</div>`;
    if(remarks.account)lines+=`<div><strong>${l.pdf_account}：</strong><span style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;letter-spacing:0.08em;">${remarks.account}</span></div>`;
    if(remarks.notes)lines+=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid #dce8ff;color:#555;white-space:pre-wrap;">${remarks.notes}</div>`;
    remarksHtml=`<div class="pdf-section-title" style="margin-top:8px;">${l.pdf_payment}</div><div class="pdf-remarks">${lines}</div>`;
  }

  document.getElementById('pdf-content').innerHTML=`
    <div class="pdf-header">
      <div>
        <div class="pdf-logo">Time<span>Bill</span> Pro</div>
        <div style="font-size:12px;color:#999;margin-top:2px;">timebill.pro</div>
      </div>
      <div style="text-align:right;">
        <div class="pdf-doc-title">${l.pdf_title}</div>
        <div class="pdf-doc-date">${l.bill_date_label}：${dateStr}</div>
      </div>
    </div>

    <div class="pdf-section-title">${l.pdf_subtotal}</div>
    <table class="pdf-table">
      <thead><tr>
        <th></th>
        <th>${l.pdf_project}</th>
        <th>${l.pdf_hours}</th>
        <th>${l.pdf_rate}</th>
        <th>${l.pdf_amount}</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>

    <div class="pdf-total-row">
      <div class="pdf-total-box">
        <div class="row"><span>${l.bill_total_hours}</span><span style="font-family:'JetBrains Mono',monospace;">${fmtShort(totalMs)}</span></div>
        <div class="row big"><span>${l.pdf_total_label}</span><span>¥${totalAmt.toFixed(2)}</span></div>
      </div>
    </div>

    ${remarksHtml}

    <div class="pdf-footer">${l.bill_footer} · ${dateStr}${!state.isPro?'<br><span style="color:#bbb;font-size:10px;">Powered by TimeBill Pro (Free) — timebillpro.app</span>':''}</div>
  `;
  document.getElementById('pdf-preview').style.display='block';
}
function closePdfPreview(){document.getElementById('pdf-preview').style.display='none';}

// ─── BACKUP ────────────────────────────────────────────────────────────────────
function exportJSON(){
  const backup={version:2,exported:new Date().toISOString(),projects:state.projects,sessions:state.sessions,remarks};
  const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date();
  a.href=url;a.download=`timebill-backup-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast(t('toast_exported'));
}
function importJSON(evt){
  const file=evt.target.files[0];if(!file)return;evt.target.value='';
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data.projects)||!Array.isArray(data.sessions))throw new Error('invalid');
      if(!confirm(t('confirm_import')))return;
      state.projects=data.projects;state.sessions=data.sessions;
      if(data.remarks)remarks={payee:'',bank:'',account:'',notes:'',...data.remarks};
      save();applyLang();showToast(t('toast_imported'));
    }catch(err){showToast(t('toast_import_err'));}
  };reader.readAsText(file);
}

// ─── MISC ──────────────────────────────────────────────────────────────────────
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400);}
function updateClock(){const d=new Date();document.getElementById('current-time').textContent=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
setInterval(updateClock,10000);updateClock();
document.getElementById('project-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('remarks-modal').addEventListener('click',function(e){if(e.target===this)closeRemarksModal();});

// ─── INIT ──────────────────────────────────────────────────────────────────────
load();
if(!state.projects.length){const demo=LANGS[currentLang].demo;state.projects=demo.map((p,i)=>({id:String(i+1),...p}));save();}
applyLang();
updateTierUI();
</script>
